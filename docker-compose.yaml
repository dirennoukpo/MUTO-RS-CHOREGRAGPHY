services:
  ros-humble-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        USERNAME: ${HOST_USER:-ros}
        GROUPNAME: ${HOST_GROUP:-ros}
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: ros-humble-dev:latest
    container_name: ros-humble-dev
    hostname: ros-humble-dev
    network_mode: host
    ipc: host
    tty: true
    stdin_open: true
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ros-humble-history:/commandhistory
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
    devices:
      - /dev/snd:/dev/snd
    environment:
      - ROS_DISTRO=humble
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-33}
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - PULSE_SERVER=unix:/tmp/pulse/native
      - XDG_RUNTIME_DIR=/tmp

volumes:
  ros-humble-history:
